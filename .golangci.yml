version: "2"

linters:
  default: standard
  enable:
    - gocritic
    - misspell
    - unconvert
  exclusions:
    rules:
      # Don't require error checks on fmt print functions (writing to stdout/buffers)
      - linters: [errcheck]
        source: "fmt\\.Fprint"
      # Don't require error checks on os.Remove (best-effort cleanup)
      - linters: [errcheck]
        source: "os\\.Remove"
      # Don't require error checks on defer Close
      - linters: [errcheck]
        source: "defer.*\\.Close"
      # Don't require error checks in test files (setup helpers, assertions)
      - linters: [errcheck]
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
