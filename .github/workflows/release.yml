name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Run tests
        run: go test ./...

  build-darwin:
    needs: test
    runs-on: macos-latest
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Build darwin/arm64
        run: |
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 go build \
            -ldflags "-s -w -X github.com/momhq/mom/ingress/cli.Version=${GITHUB_REF#refs/tags/} -X github.com/momhq/mom/ingress/cli.Commit=${GITHUB_SHA::7}" \
            -o bin/mom-darwin-arm64 ./cmd/mom

      - name: Build darwin/amd64
        run: |
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 go build \
            -ldflags "-s -w -X github.com/momhq/mom/ingress/cli.Version=${GITHUB_REF#refs/tags/} -X github.com/momhq/mom/ingress/cli.Commit=${GITHUB_SHA::7}" \
            -o bin/mom-darwin-amd64 ./cmd/mom

      - name: Compress
        run: |
          cd bin && gzip -k mom-darwin-arm64 && gzip -k mom-darwin-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-binaries
          path: bin/mom-darwin-*.gz

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Build linux/amd64
        run: |
          CGO_ENABLED=1 go build \
            -ldflags "-s -w -X github.com/momhq/mom/ingress/cli.Version=${GITHUB_REF#refs/tags/} -X github.com/momhq/mom/ingress/cli.Commit=${GITHUB_SHA::7}" \
            -o bin/mom-linux-amd64 ./cmd/mom

      - name: Compress
        run: cd bin && gzip -k mom-linux-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: bin/mom-linux-*.gz

  release:
    needs: [build-darwin, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # If a release already exists (pre-created with curated notes),
          # just upload the binaries. Otherwise create with auto-generated notes.
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" artifacts/mom-*.gz --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              artifacts/mom-*.gz
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          TARBALL_URL="https://github.com/momhq/mom/archive/refs/tags/${TAG}.tar.gz"
          SHA256=$(curl -sL "$TARBALL_URL" | sha256sum | awk '{print $1}')
          gh api repos/momhq/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[sha256]=$SHA256" \
            -f "client_payload[url]=$TARBALL_URL"
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
