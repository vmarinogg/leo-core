name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Check go mod tidy
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: Build
        run: make build

      - name: Smoke test
        run: ./bin/mom version

      - name: Test with coverage and race detector
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          THRESHOLD=55
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Vulnerability scan
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Check new Go files have tests
        if: github.event_name == 'pull_request'
        run: |
          cd "$GITHUB_WORKSPACE"
          MISSING=""
          for f in $(git diff --name-only --diff-filter=A origin/main -- './**/*.go' | grep -v '_test.go$'); do
            TEST_FILE="${f%%.go}_test.go"
            if [ ! -f "$TEST_FILE" ]; then
              MISSING="$MISSING\n- \`$f\` (expected \`$TEST_FILE\`)"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::warning::New Go files without corresponding test files:${MISSING}"
            # Post comment on PR
            BODY=$(printf "### TDD check\n\nNew source files missing test coverage:\n%b\n\nPer [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#tdd), all code must follow test-driven development." "$MISSING")
            gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" || true
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11

      - name: Vet
        run: go vet ./...
