name: Harness Adapter Proposal
description: Propose a new harness adapter (Cursor, Windsurf, etc.)
labels: ["adapter"]
body:
  - type: input
    id: harness
    attributes:
      label: Harness name
      placeholder: "e.g. Cursor, Windsurf"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this adapter?
      description: What use case does it enable?
    validations:
      required: true
  - type: textarea
    id: approach
    attributes:
      label: Implementation approach
      description: How would the adapter work? What files does the harness use?
