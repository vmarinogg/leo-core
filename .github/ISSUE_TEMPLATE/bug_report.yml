name: Bug Report
description: Report a bug in MOM
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: harness
    attributes:
      label: Harness
      options:
        - Claude Code
        - Cursor
        - Windsurf
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MOM version
      placeholder: "mom version"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15, Ubuntu 24.04, etc."
    validations:
      required: true
